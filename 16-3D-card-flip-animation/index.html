<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"/>
    <title>3D Card Flip Animation</title>
</head>
<body>
    <div class="cardbox">
        <div class="card facebook">
            <div class="card-front"><i class="fab fa-facebook-f"></i></div>
            <div class="card-back">Facebook</div>
        </div>
    </div>
    <div class="cardbox">
        <div class="card twitter">
            <div class="card-front"><i class="fab fa-twitter"></i></div>
            <div class="card-back">Twitter</div>
        </div>
    </div>
    <div class="cardbox">
        <div class="card Instagram">
            <div class="card-front"><i class="fab fa-instagram"></i></div>
            <div class="card-back">Instagram</div>
        </div>
    </div>
</body>
</html>
